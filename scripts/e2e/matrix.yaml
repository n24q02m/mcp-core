# E2E test matrix — single source of truth for the 15-config 3-axis taxonomy.
#
# Axes:
#   - auth: none / oauth / relay
#   - interaction: non-interaction / interaction (encoded via tier)
#   - tier: t0-only / t2-non-interaction / t2-interaction
#
# Multi-user is a deployment property of remote mode (PUBLIC_URL env), not a
# config — single isolation test runs at mcp-core fixture level.
#
# Schema validated by tests/test_matrix.py.
#
# Reclassified out of T2 matrix (2026-04-27):
#   - notion-oauth: requires registering ``http://127.0.0.1:38765/callback``
#     in the Notion app dashboard out-of-band before each clean-state run,
#     violating ``feedback_no_out_of_band_test_setup.md``. Notion has no
#     DCR + does not accept loopback wildcards, so the only valid options
#     are (a) prod-stable callback + tunnel, (b) reclassify out of T2.
#     Path (b) chosen here. notion-oauth is verified post-deploy via
#     manual smoke against ``https://notion-mcp.n24q02m.com`` instead;
#     it is NOT part of the T2 PASS gate for release cascade.

version: 1
configs:
  # ============================================================
  # T0-only (CI/precommit, no upstream identity, 5 configs)
  # ============================================================

  - id: mcp-core-ci
    repo: mcp-core
    tier: t0-only
    auth: none
    test: "unit + integration"

  - id: qwen3-embed-ci
    repo: qwen3-embed
    tier: t0-only
    auth: none
    test: "tests (Modal worker stubs)"

  - id: web-core-ci
    repo: web-core
    tier: t0-only
    auth: none
    test: "build + lint"

  - id: claude-plugins-ci
    repo: claude-plugins
    tier: t0-only
    auth: none
    test: "skill validation"

  - id: godot-stub
    repo: better-godot-mcp
    tier: t0-only
    auth: none
    test: "stub mode (no exe required)"

  # ============================================================
  # T2 non-interaction (driver pre-fills relay form, 6 configs)
  # ============================================================

  - id: notion-paste-token
    repo: better-notion-mcp
    tier: t2-non-interaction
    auth: relay
    deployment: [local]
    skret_namespace: /better-notion-mcp/prod
    # Driver POSTs the form field name from RELAY_SCHEMA (NOTION_TOKEN);
    # skret carries both NOTION_TOKEN + legacy NOTION_INTEGRATION_TOKEN
    # with the same value so older docs/tools keep working.
    skret_keys: [NOTION_TOKEN]

  - id: email-gmail
    repo: better-email-mcp
    tier: t2-non-interaction
    auth: relay
    deployment: [local, remote]
    skret_namespace: /better-email-mcp/prod
    # Email's relay form is JS-rendered (no static <input>) and POSTs a
    # single ``EMAIL_CREDENTIALS`` field with format
    # ``email1:pass1,email2:pass2``. skret stores the assembled string +
    # the legacy GMAIL_EMAIL/GMAIL_APP_PASSWORD pair under the same
    # namespace so older docs keep working.
    skret_keys: [EMAIL_CREDENTIALS, MCP_DCR_SERVER_SECRET]

  - id: telegram-bot
    repo: better-telegram-mcp
    tier: t2-non-interaction
    auth: relay
    deployment: [local, remote]
    skret_namespace: /better-telegram-mcp/prod
    skret_keys: [TELEGRAM_BOT_TOKEN, MCP_DCR_SERVER_SECRET]

  - id: crg
    repo: better-code-review-graph
    tier: t2-non-interaction
    auth: relay
    deployment: [local, remote]
    skret_namespace: /better-code-review-graph/prod
    skret_keys: [JINA_AI_API_KEY, GEMINI_API_KEY, OPENAI_API_KEY, COHERE_API_KEY, MCP_DCR_SERVER_SECRET]
    skret_optional: [JINA_AI_API_KEY, GEMINI_API_KEY, OPENAI_API_KEY, COHERE_API_KEY]

  - id: imagine
    repo: imagine-mcp
    tier: t2-non-interaction
    auth: relay
    deployment: [local, remote]
    skret_namespace: /imagine-mcp/prod
    skret_keys: [GEMINI_API_KEY, OPENAI_API_KEY, XAI_API_KEY, MCP_DCR_SERVER_SECRET]
    skret_optional: [GEMINI_API_KEY, OPENAI_API_KEY, XAI_API_KEY]

  - id: godot-with-exe
    repo: better-godot-mcp
    tier: t2-non-interaction
    auth: none
    deployment: [local]
    requires_local_resource: "godot binary on PATH or GODOT_PATH env"

  # ============================================================
  # T2 interaction (driver fills, user clicks at upstream gate, 4 configs)
  # ============================================================

  - id: email-outlook
    repo: better-email-mcp
    tier: t2-interaction
    auth: relay
    flow: device-code
    # local-relay mode rejects outlook.com / hotmail.com / live.com paste-
    # token submits with a "switch to remote-relay" message
    # (better-email-mcp/CLAUDE.md). Outlook is only testable in remote-
    # relay where the server initiates Microsoft Device Code OAuth2 itself.
    # OUTLOOK_CLIENT_ID falls back to the bundled public Azure client at
    # ``oauth2.ts:88`` (d56f8c71-...) so no skret entry is required.
    deployment: [remote]
    skret_namespace: /better-email-mcp/prod
    skret_keys: [OUTLOOK_EMAIL, MCP_DCR_SERVER_SECRET]
    user_gate: "Click Microsoft device-code link"

  - id: telegram-user
    repo: better-telegram-mcp
    tier: t2-interaction
    auth: relay
    flow: browser-form
    # User mode (MTProto) requires phone -> OTP -> optional 2FA password,
    # all chained in the same /authorize form via next_step responses
    # (otp_required / password_required). The driver cannot fill OTP/2FA
    # server-to-server (they come from the user's phone, not skret), so
    # it announces the local /authorize URL and waits for the form to
    # navigate the browser into the local callback listener after the
    # multi-step exchange completes.
    deployment: [local, remote]
    skret_namespace: /better-telegram-mcp/prod
    skret_keys: [TELEGRAM_PHONE, MCP_DCR_SERVER_SECRET]
    user_gate: "Type OTP + 2FA password in browser"

  # wet-full / mnemo-full: relay form posts API keys (optional) + triggers
  # GDrive Device Code OAuth. Both single-user and multi-user remote mode
  # (PUBLIC_URL set) start the device-code flow on credential save and
  # respond with ``next_step.type == "oauth_device_code"``. Per-sub token
  # storage at ``~/.<server>-mcp/subs/<sub>/tokens/google_drive.json``
  # (wet-mcp commit 52ec8da, mnemo-mcp commit b0b66e4 — closes the
  # cross-user GDrive token leak gap from spec 2026-04-25 #134/#187).
  - id: wet-full
    repo: wet-mcp
    tier: t2-interaction
    auth: relay
    flow: device-code
    deployment: [local, remote]
    skret_namespace: /wet-mcp/prod
    skret_keys: [JINA_AI_API_KEY, GEMINI_API_KEY, OPENAI_API_KEY, COHERE_API_KEY, MCP_DCR_SERVER_SECRET]
    skret_optional: [JINA_AI_API_KEY, GEMINI_API_KEY, OPENAI_API_KEY, COHERE_API_KEY]
    user_gate: "Click GDrive device-code link"

  - id: mnemo-full
    repo: mnemo-mcp
    tier: t2-interaction
    auth: relay
    flow: device-code
    deployment: [local, remote]
    skret_namespace: /mnemo-mcp/prod
    skret_keys: [JINA_AI_API_KEY, GEMINI_API_KEY, OPENAI_API_KEY, COHERE_API_KEY, MCP_DCR_SERVER_SECRET]
    skret_optional: [JINA_AI_API_KEY, GEMINI_API_KEY, OPENAI_API_KEY, COHERE_API_KEY]
    user_gate: "Click GDrive device-code link"
