[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "n24q02m-mcp-core"
version = "0.1.0"
description = "Unified MCP Streamable HTTP 2025-11-25 transport, OAuth 2.1 AS, lifecycle, install"
readme = "../../README.md"
requires-python = "==3.13.*"
license = { text = "MIT" }
authors = [{ name = "n24q02m", email = "quangminh2422004@gmail.com" }]
keywords = ["mcp", "model-context-protocol", "streamable-http", "oauth21", "transport"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "fastmcp>=0.5.0",
    "httpx>=0.28.1",
    "cryptography>=46.0.5",
    "authlib>=1.3.0",
    "starlette>=0.37.0",
    "pydantic>=2.7.0",
    "loguru>=0.7.0",
    "platformdirs>=4.9.6",
]

[project.urls]
Homepage = "https://github.com/n24q02m/mcp-core"
Repository = "https://github.com/n24q02m/mcp-core"
Issues = "https://github.com/n24q02m/mcp-core/issues"

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-asyncio>=1.2.0",
    "pytest-cov>=7.0.0",
    "pytest-timeout>=2.4.0",
    "ruff>=0.15.7",
    "ty>=0.0.1a22",
]

[tool.hatch.build.targets.wheel]
packages = ["src/mcp_core"]

[tool.ruff]
line-length = 120
target-version = "py313"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
