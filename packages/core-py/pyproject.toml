[project]
name = "mcp-core"
version = "0.1.0"
description = "Unified MCP Streamable HTTP 2025-11-25 transport, OAuth 2.1 AS, lifecycle, install"
readme = "../../README.md"
requires-python = ">=3.13"
license = "MIT"
authors = [{ name = "n24q02m" }]
keywords = ["mcp", "model-context-protocol", "streamable-http", "oauth21", "ai"]
dependencies = [
    "fastmcp>=0.5.0",
    "httpx>=0.27.0",
    "cryptography>=46.0.7",
    "authlib>=1.3.0",
    "starlette>=0.37.0",
    "pydantic>=2.7.0",
    "loguru>=0.7.0",
    "platformdirs>=4.0.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23", "ruff>=0.5", "ty>=0.0.1"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mcp_core"]

[tool.ruff]
line-length = 88
target-version = "py313"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
