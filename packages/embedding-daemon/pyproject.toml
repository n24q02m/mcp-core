[project]
name = "mcp-embedding-daemon"
version = "0.1.0"
description = "Shared ONNX/GGUF embedding server for the n24q02m MCP ecosystem"
readme = "../../README.md"
requires-python = ">=3.13"
license = "MIT"
authors = [{ name = "n24q02m" }]
dependencies = [
    "fastapi>=0.111.0",
    "uvicorn>=0.30.0",
    "onnxruntime>=1.18.0",
    "numpy>=1.26.0",
    "httpx>=0.27.0",
    "pydantic>=2.7.0",
]

[project.optional-dependencies]
gguf = ["llama-cpp-python>=0.2.70"]
cuda = ["onnxruntime-gpu>=1.18.0"]
dev = ["pytest>=8.0", "ruff>=0.5"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mcp_embedding_daemon"]
