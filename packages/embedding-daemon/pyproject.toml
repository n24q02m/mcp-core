[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mcp-embedding-daemon"
version = "1.6.2"
description = "Shared ONNX/GGUF embedding server for the n24q02m MCP ecosystem"
readme = "README.md"
requires-python = "==3.13.*"
license = { text = "MIT" }
authors = [{ name = "n24q02m", email = "quangminh2422004@gmail.com" }]
keywords = ["mcp", "embedding", "onnx", "gguf", "inference"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "fastapi>=0.136.0",
    "uvicorn>=0.44.0",
    "onnxruntime>=1.24.4",
    "numpy>=1.26.4",
    "httpx>=0.28.1",
    "pydantic>=2.13.3",
]

[project.optional-dependencies]
# `gguf` extra is intentionally empty for v1.x: the GGUF backend is a stub
# (see src/mcp_embedding_daemon/backends/gguf.py). Pulling `llama-cpp-python`
# in eagerly drags the unmaintained `diskcache` package (CVE-2025-69872, no
# upstream patch) into the lock without any code path actually using it.
# Re-add the dep (and gate `LlamaDiskCache` behind a JSON/msgpack alternative
# or runtime opt-in) when the GGUF backend lands.
gguf = []
cuda = ["onnxruntime-gpu>=1.24.4"]

[project.urls]
Homepage = "https://github.com/n24q02m/mcp-core"
Repository = "https://github.com/n24q02m/mcp-core"
Issues = "https://github.com/n24q02m/mcp-core/issues"

[project.scripts]
mcp-embedding-daemon = "mcp_embedding_daemon.__main__:main"

[dependency-groups]
dev = [
    "httpx>=0.28.1",
    "pytest>=9.0.3",
    "pytest-cov>=7.1.0",
    "ruff>=0.15.11",
    "ty>=0.0.32",
]

[tool.hatch.build.targets.wheel]
packages = ["src/mcp_embedding_daemon"]

[tool.ruff]
line-length = 120
target-version = "py313"
