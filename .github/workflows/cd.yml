name: CD

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type"
        required: true
        type: choice
        options:
          - stable
          - beta

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ============================================================================
  # Semantic Release (version bump, CHANGELOG, tag, GitHub Release)
  # ============================================================================
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs.released }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      is_prerelease: ${{ steps.release.outputs.is_prerelease }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2
        with:
          egress-policy: audit

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ vars.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - uses: python-semantic-release/python-semantic-release@350c48fcb3ffcdfd2e0a235206bc2ecea6b69df0 # v10
        id: release
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          config_file: semantic-release.toml
          prerelease: ${{ inputs.release_type == 'beta' }}
          prerelease_token: beta

      - uses: python-semantic-release/publish-action@310a9983a0ae878b29f3aac778d7c77c1db27378 # v10
        if: steps.release.outputs.released == 'true'
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          tag: ${{ steps.release.outputs.tag }}

  # ============================================================================
  # Publish TypeScript package (core-ts) to npm
  # ============================================================================
  publish-npm:
    name: Publish to npm
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.release.outputs.tag }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - run: bun install --frozen-lockfile

      - name: Inject version from PSR into package.json
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          for pkg in packages/core-ts; do
            node -e "const f='$pkg/package.json'; const p=require('./'+f); p.version='$VERSION'; require('fs').writeFileSync(f, JSON.stringify(p, null, 2)+'\n')"
            echo "Set $pkg version to $VERSION"
          done

      - name: Build and publish core-ts
        run: |
          cd packages/core-ts && bun run build
          VERSION=$(node -p "require('./package.json').version")
          if npm view @n24q02m/mcp-core@"$VERSION" version 2>/dev/null; then
            echo "core-ts@$VERSION already published, skipping"
          else
            TAG=${{ needs.release.outputs.is_prerelease == 'true' && 'beta' || 'latest' }}
            npm publish --provenance --access public --no-git-checks --tag "$TAG"
          fi

  # ============================================================================
  # Publish Python packages to PyPI
  # ============================================================================
  publish-pypi:
    name: Publish to PyPI (${{ matrix.package }})
    needs: release
    if: needs.release.outputs.released == 'true'
    strategy:
      fail-fast: false
      matrix:
        package: [core-py, embedding-daemon, stdio-proxy]
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.release.outputs.tag }}

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Build and publish
        working-directory: packages/${{ matrix.package }}
        run: |
          cp ../../README.md .
          uv build
          uv publish

  # ============================================================================
  # Auto-create tracking issues in downstream repos (stable releases only)
  # ============================================================================
  create-downstream-issues:
    name: Create downstream bump issues
    needs: [release, publish-npm, publish-pypi]
    if: needs.release.outputs.released == 'true' && needs.release.outputs.is_prerelease == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2
        with:
          egress-policy: audit

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ vars.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_KEY }}
          owner: n24q02m
          repositories: >-
            better-notion-mcp,better-email-mcp,better-telegram-mcp,
            wet-mcp,mnemo-mcp,better-code-review-graph,better-godot-mcp,
            imagine-mcp

      - name: Create issues in downstream repos
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ needs.release.outputs.version }}
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          set -euo pipefail
          TS_DOWNSTREAM="better-notion-mcp better-email-mcp better-godot-mcp"
          PY_DOWNSTREAM="better-telegram-mcp wet-mcp mnemo-mcp better-code-review-graph imagine-mcp"
          CHANGELOG_URL="https://github.com/n24q02m/mcp-core/releases/tag/${TAG}"

          create_issue() {
            local repo="$1"
            local pkg_name="$2"
            local title="chore: bump ${pkg_name} to ${VERSION}"
            local body
            body=$(cat <<EOF
          mcp-core released stable **${TAG}**.

          **Changelog:** ${CHANGELOG_URL}

          ## Action required

          Bump the \`${pkg_name}\` pin in this repo and regenerate lockfile:

          - TypeScript: update \`@n24q02m/mcp-core\` in \`package.json\` → \`bun install\`
          - Python: update \`n24q02m-mcp-core\` in \`pyproject.toml\` → \`uv lock\`

          Then open a PR with title \`fix: bump mcp-core to ${VERSION}\`.

          _Auto-created by mcp-core CD. See \`feedback_core_release_auto_issue.md\`._
          EOF
          )

            existing=$(gh issue list -R "n24q02m/${repo}" --search "in:title \"bump ${pkg_name} to ${VERSION}\"" --state all --json number --jq '.[0].number // ""')
            if [ -n "$existing" ]; then
              echo "::notice::Issue already exists in ${repo}: #${existing}"
              return 0
            fi
            gh issue create -R "n24q02m/${repo}" --title "$title" --body "$body" --label "dependencies" || \
              gh issue create -R "n24q02m/${repo}" --title "$title" --body "$body"
          }

          for repo in $TS_DOWNSTREAM; do
            create_issue "$repo" "@n24q02m/mcp-core" || echo "::warning::Failed to create issue in $repo"
          done
          for repo in $PY_DOWNSTREAM; do
            create_issue "$repo" "n24q02m-mcp-core" || echo "::warning::Failed to create issue in $repo"
          done
