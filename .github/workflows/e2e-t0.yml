# T0 E2E configs run automatically on PR + main push.
#
# T2 (interaction + non-interaction with real creds) is local-manual only via
# `make e2e-full` -- never in CI per spec section "Tier 0 vs Tier 2".

name: E2E T0
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Restrict the default GITHUB_TOKEN — this workflow only checks out source
# and runs tests, so read-only contents access is sufficient.
permissions:
  contents: read

jobs:
  e2e-t0:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config: [mcp-core-ci]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          enable-cache: true

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install workspace dependencies (TS)
        run: bun install --frozen-lockfile

      - name: Install core-py dev deps
        run: cd packages/core-py && uv sync --group dev

      - name: Install driver dependencies
        run: |
          cd scripts/e2e
          uv sync

      - name: Run T0 config ${{ matrix.config }}
        run: |
          cd scripts/e2e
          PYTHONPATH=.. uv run python -m e2e.driver ${{ matrix.config }}
